<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이름 없는 증인들</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="viewport">
      <main id="game-canvas" aria-label="이름 없는 증인들 홈 화면">
        <div class="bg-layer"></div>
        <div class="bg-vignette"></div>
        <div class="outer-frame"></div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <aside class="sidebar">
          <div class="sidebar-line sidebar-line-left"></div>
          <div class="sidebar-line sidebar-line-right"></div>

          <div class="brand-logo ornate-flame" aria-hidden="true"></div>
          <h1 class="brand-title">이름 없는 증인들</h1>
          <p class="brand-subtitle">하나님의 이야기를 따라 걷는 여정</p>

          <nav class="side-menu" aria-label="주 메뉴">
            <button class="menu-button active" style="--x:42px;--y:203px" type="button">
              <span class="menu-icon icon-book"></span>
              <span class="menu-text"><strong>이야기</strong><em>장 선택</em></span>
            </button>
            <button class="menu-button" style="--x:42px;--y:290px" type="button">
              <span class="menu-icon icon-people"></span>
              <span class="menu-text"><strong>증인들</strong><em>인물과 기록</em></span>
            </button>
            <button class="menu-button" style="--x:42px;--y:375px" type="button">
              <span class="menu-icon icon-scroll"></span>
              <span class="menu-text"><strong>기록</strong><em>문서와 유물</em></span>
            </button>
            <button class="menu-button" style="--x:42px;--y:461px" type="button">
              <span class="menu-icon icon-trophy"></span>
              <span class="menu-text"><strong>업적</strong><em>여정의 발자취</em></span>
            </button>
            <button class="menu-button" style="--x:42px;--y:546px" type="button">
              <span class="menu-icon icon-swords"></span>
              <span class="menu-text"><strong>훈련</strong><em>기술과 전투</em></span>
            </button>
            <button class="menu-button" style="--x:42px;--y:631px" type="button">
              <span class="menu-icon icon-gear"></span>
              <span class="menu-text"><strong>설정</strong><em>옵션과 지원</em></span>
            </button>
          </nav>

          <div class="bottom-icons" aria-hidden="true">
            <button class="small-icon icon-bag" style="--x:50px;--y:783px" type="button"></button>
            <button class="small-icon icon-crown" style="--x:116px;--y:783px" type="button"></button>
            <button class="small-icon icon-scroll-mini" style="--x:184px;--y:783px" type="button"></button>
            <button class="small-icon icon-trophy-mini" style="--x:251px;--y:783px" type="button"></button>
            <span class="decor-cross"></span>
          </div>
        </aside>

        <section class="top-banner" aria-label="진행 정보">
          <div class="top-cross"></div>
          <div class="chapter-banner">제 1 막 · 시작의 증인</div>
        </section>

        <section class="top-actions" aria-label="상단 메뉴">
          <button class="circle-action top-book" type="button" aria-label="도감"></button>
          <button class="circle-action top-gear" type="button" aria-label="설정"></button>
          <div class="bookmark-progress" aria-hidden="true"></div>
          <div class="progress-text">증인력 전<br />12%</div>
        </section>

        <section class="chapter-area" aria-label="장 선택">
          <article class="chapter-card large available" style="--x:714px;--y:139px;--w:909px;--h:292px">
            <div class="chapter-art chapter-art-1"></div>
            <div class="card-shade"></div>
            <div class="card-ornament"></div>
            <p class="chapter-small">1장</p>
            <h2 class="chapter-title">벽돌과 바다</h2>
            <p class="chapter-subtitle">믿음으로 세운 성벽</p>
            <button class="continue-button" type="button">이야기 계속하기 <span>›</span></button>
          </article>

          <article class="chapter-card small locked" style="--x:714px;--y:446px;--w:426px;--h:160px">
            <div class="chapter-art locked-art locked-art-2"></div>
            <p class="locked-label">2장</p>
            <div class="lock-mark"></div>
          </article>
          <article class="chapter-card small locked" style="--x:1153px;--y:446px;--w:470px;--h:160px">
            <div class="chapter-art locked-art locked-art-3"></div>
            <p class="locked-label">3장</p>
            <div class="lock-mark"></div>
          </article>
          <article class="chapter-card small locked" style="--x:714px;--y:621px;--w:426px;--h:160px">
            <div class="chapter-art locked-art locked-art-4"></div>
            <p class="locked-label">4장</p>
            <div class="lock-mark"></div>
          </article>
          <article class="chapter-card small locked" style="--x:1153px;--y:621px;--w:470px;--h:160px">
            <div class="chapter-art locked-art locked-art-5"></div>
            <p class="locked-label">5장</p>
            <div class="lock-mark"></div>
          </article>
        </section>

        <footer class="scripture">
          <p class="quote">두려워할지 너를 위하여 싸우시리니 너희는 가만히 있을지니라</p>
          <p class="reference">출애굽기 14:14</p>
        </footer>

        <button class="hourglass-button" type="button" aria-label="시간 기록"></button>
      </main>
    </div>

    <script src="src/main.js"></script>
  </body>
</html>
